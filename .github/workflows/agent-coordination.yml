name: Agent Coordination (exhaustive)

on:
  workflow_dispatch: {}

jobs:
  coordinator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Announce
        run: |
          echo "Agent coordinator: prepare tasks and notify reviewers"

  reviewer:
    needs: coordinator
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Python and deps
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f docker/requirements.txt ]; then pip install -r docker/requirements.txt || true; fi
      - name: Run static checks
        run: |
          python -m pip install pyright pytest || true
          pyright || true
      - name: Run tests
        run: |
          python -m pytest -q || true
      - name: List changed files
        run: git --no-pager diff --name-only origin/main..HEAD || true

  integrator:
    needs: [coordinator, reviewer]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare integration artifacts
        run: |
          echo "Integrator: create integration plan and run tests"
          git --no-pager log -n 5 --pretty=oneline
          python -m pytest -q || true
      - name: Upload reports
        run: |
          echo "Upload test and static analysis reports (to be implemented)"

