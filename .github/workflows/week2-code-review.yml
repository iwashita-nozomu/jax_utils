name: Week 2 - Code Review Skill

on:
  push:
    branches:
      - main
    paths:
      - 'python/**'
      - '.github/skills/02-code-review/**'
      - '.github/workflows/week2-code-review.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'python/**'

jobs:
  # Job 1: Layer A - 基礎検証
  layer-a-foundation:
    name: Layer A - Foundation Checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [type, linting, docstring]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyright ruff black pytest coverage

      - name: Run ${{ matrix.component }} check
        id: check
        run: |
          case "${{ matrix.component }}" in
            type)
              python3 .github/skills/02-code-review/layer_a_type_checker.py \
                --target-dir python --json > result.json
              ;;
            linting)
              python3 .github/skills/02-code-review/layer_a_linting_checker.py \
                --target-dir python --json > result.json
              ;;
            docstring)
              python3 .github/skills/02-code-review/layer_a_docstring_checker.py \
                --target-dir python --json > result.json
              ;;
          esac

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: layer-a-${{ matrix.component }}-result
          path: result.json

      - name: Parse result
        if: always()
        run: |
          STATUS=$(python3 -c "import json; print(json.load(open('result.json')).get('status', 'UNKNOWN'))")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" = "FAIL" ]; then
            echo "### ✅ ${{ matrix.component }}: PASS" >> $GITHUB_STEP_SUMMARY || true
          elif [ "$STATUS" = "WARN" ]; then
            echo "### ⚠️ ${{ matrix.component }}: WARN (改善推奨)" >> $GITHUB_STEP_SUMMARY || true
          elif [ "$STATUS" = "PASS" ]; then
            echo "### ✅ ${{ matrix.component }}: PASS" >> $GITHUB_STEP_SUMMARY || true
          fi

  # Job 2: Layer A 統合結果
  layer-a-summary:
    name: Layer A Summary
    needs: layer-a-foundation
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all results
        uses: actions/download-artifact@v3
        with:
          path: results/

      - name: Generate summary
        run: |
          echo "## 📋 Layer A - 基礎検証 結果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for f in results/*/result.json; do
            if [ -f "$f" ]; then
              COMPONENT=$(basename $(dirname "$f") | sed 's/layer-a-//;s/-result//')
              STATUS=$(python3 -c "import json; print(json.load(open('$f')).get('status', 'UNKNOWN'))")
              if [ "$STATUS" = "PASS" ]; then
                echo "- ✅ $COMPONENT: PASS" >> $GITHUB_STEP_SUMMARY
              elif [ "$STATUS" = "FAIL" ]; then
                echo "- ❌ $COMPONENT: FAIL" >> $GITHUB_STEP_SUMMARY
              else
                echo "- ⚠️ $COMPONENT: $STATUS" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done

  # Job 3: Doc-Test Triplet チェック
  doc-test-triplet:
    name: Layer C Preview - Doc-Test Triplet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run triplet check
        id: triplet
        run: |
          python3 .github/skills/02-code-review/check_doc_test_triplet.py \
            --target-dir python --json > triplet_result.json

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: layer-c-triplet-result
          path: triplet_result.json

      - name: Display result
        if: always()
        run: |
          python3 -c "
          import json
          with open('triplet_result.json') as f:
              data = json.load(f)
          print(f\"Status: {data.get('status', 'UNKNOWN')}\")
          print(f\"Files checked: {data.get('files_checked', '?')}\")
          print(f\"Functions with issues: {data.get('total_functions_with_issues', '?')}\")
          "

  # Job 4: PR コメント（PR時のみ）
  pr-comment:
    name: Add Review Comment to PR
    needs: [layer-a-summary, doc-test-triplet]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && always()
    permissions:
      pull-requests: write
    steps:
      - name: Download all results
        uses: actions/download-artifact@v3
        with:
          path: results/

      - name: Generate PR comment
        id: comment
        run: |
          echo "## 🔍 Skill 2: Code Review (Layer A)" > pr_comment.md
          echo "" >> pr_comment.md
          echo "### 検証結果" >> pr_comment.md
          
          # 結果をマージ
          find results/ -name "result.json" -o -name "triplet_result.json" | while read f; do
            if [ -f "$f" ]; then
              echo "- Checked: $f" >> pr_comment.md
            fi
          done
          
          echo "" >> pr_comment.md
          echo "**詳細は Artifacts を参照ください。**" >> pr_comment.md
          
          cat pr_comment.md

      - name: Comment on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('pr_comment.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
